<!DOCTYPE html>
<html lang="en">
<head>
  <title>resume-score - INTERNLY</title>
  <meta property="og:title" content="resume-score - INTERNLY" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./resume-score.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* ── Responsive overrides ── */
    @media (max-width: 900px) {
      .analysis-wrapper {
        flex-direction: column !important;
        align-items: center !important;
      }
      .resume-score-container2,
      .resume-score-container3,
      .resume-score-container4 {
        width: 90vw !important;
        max-width: 500px;
        height: auto !important;
      }
      .resume-score-text1 {
        font-size: 26px !important;
      }
    }

    /* ── Upload pill ── */
    .uploaded-pill {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(187,247,208,0.25);
      text-align: left;
      width: 100%;
    }
    .uploaded-pill .pill-label {
      font-size: 12px;
      font-weight: 700;
      color: #bbf7d0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .uploaded-pill .pill-file {
      margin-top: 4px;
      font-size: 13px;
      color: #fff;
      word-break: break-word;
      opacity: 0.9;
    }

    /* ── Status line ── */
    .upload-inline-status {
      min-height: 18px;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    /* ── Progress bar — JS controlled, no CSS animation ── */
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #22d3ee);
      border-radius: 10px;
      transition: width 600ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Chart placeholder text ── */
    .chart-placeholder {
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="resume-score-container1">
    <h1 class="resume-score-text1">YOUR AI RESUME ANALYSIS</h1>

    <div class="analysis-wrapper">
      <div class="left-column">

        <!-- UPLOAD CARD -->
        <div class="resume-score-container2">
          <span class="resume-score-text2">UPLOAD</span>

          <div class="resume-score-lottie-node">
            <img src="./images/file-upload.png" alt="Upload icon"
                 style="width:120px; height:120px; object-fit:contain;">
          </div>

          <input id="resumeFile" type="file" accept=".pdf,.docx" style="display:none;" />

          <button id="uploadBtn" class="resume-score-button" type="button">UPLOAD RESUME</button>

          <p id="uploadStatus" class="upload-inline-status"></p>

          <div id="uploadedBox" class="uploaded-pill">
            <div class="pill-label">✅ Uploaded</div>
            <div id="uploadedFileName" class="pill-file"></div>
          </div>
        </div>

        <!-- PROGRESS CARD -->
        <div class="resume-score-container3">
          <span class="resume-score-text2">YOUR PROGRESS</span>
          <div class="progress-track" style="width:100%; height:12px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; margin-top:10px;">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-percentage" id="progressText" style="color:#22d3ee; font-size:14px; font-weight:600; margin-top:10px;">0% Complete</span>
        </div>

      </div>

      <!-- CHART CARD -->
      <div class="resume-score-container4">
        <span class="resume-score-thq-text-elm">YOUR SKILLS MATCH</span>

        <!-- Hidden until upload -->
        <div id="chartWrap" style="width:100%; padding:20px; display:none;">
          <canvas id="skillsChart"></canvas>
        </div>

        <!-- Shown before upload -->
        <p id="chartPlaceholder" class="chart-placeholder">
          Upload your resume to see your skills match
        </p>
      </div>
    </div>
  </div>

  <script>
    const uploadBtn        = document.getElementById("uploadBtn");
    const resumeFile       = document.getElementById("resumeFile");
    const uploadStatus     = document.getElementById("uploadStatus");
    const uploadedBox      = document.getElementById("uploadedBox");
    const uploadedFileName = document.getElementById("uploadedFileName");
    const progressFill     = document.getElementById("progressFill");
    const progressText     = document.getElementById("progressText");
    const chartWrap        = document.getElementById("chartWrap");
    const chartPlaceholder = document.getElementById("chartPlaceholder");

    /* kill CSS animation immediately */
    progressFill.style.transition = "none";
    progressFill.style.width = "0%";
    progressText.textContent = "0% Complete";
    setTimeout(() => { progressFill.style.transition = "width 600ms ease"; }, 100);

    let uploadedOnce = false;

    /* just open file picker on click, nothing else */
    uploadBtn.addEventListener("click", () => {
      if (!uploadedOnce) resumeFile.click();
    });

    /* EVERYTHING triggers when user picks a file */
    resumeFile.addEventListener("change", () => {
      if (!resumeFile.files.length || uploadedOnce) return;

      const file = resumeFile.files[0];
      const ext = file.name.split(".").pop().toLowerCase();

      if (!["pdf", "docx"].includes(ext)) {
        uploadStatus.textContent = "❌ Only PDF or DOCX allowed.";
        uploadStatus.style.color = "#fecaca";
        resumeFile.value = "";
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        uploadStatus.textContent = "❌ File too large. Max 5MB.";
        uploadStatus.style.color = "#fecaca";
        resumeFile.value = "";
        return;
      }

      uploadedOnce = true;

      /* ── 1. Lock button ── */
      uploadBtn.disabled = true;
      uploadBtn.style.opacity = "0.6";
      uploadBtn.style.cursor = "not-allowed";
      uploadBtn.textContent = "RESUME UPLOADED";

      /* ── 2. Show uploaded pill ── */
      uploadedFileName.textContent = file.name;
      uploadedBox.style.display = "block";

      /* ── 3. Status message ── */
      uploadStatus.textContent = "✅ Resume uploaded & analyzed!";
      uploadStatus.style.color = "#bbf7d0";

      /* ── 4. Animate progress bar ── */
      setTimeout(() => { progressFill.style.width = "30%";  progressText.textContent = "30% Complete"; }, 100);
      setTimeout(() => { progressFill.style.width = "65%";  progressText.textContent = "65% Complete"; }, 500);
      setTimeout(() => { progressFill.style.width = "100%"; progressText.textContent = "100% Complete"; }, 1000);

      /* ── 5. Show chart ── */
      chartPlaceholder.style.display = "none";
      chartWrap.style.display = "block";

      const ctx = document.getElementById("skillsChart").getContext("2d");
      new Chart(ctx, {
        type: "radar",
        data: {
          labels: ["Coding", "Design", "Logic", "Strategy", "Teamwork"],
          datasets: [{
            label: "Skill Match %",
            data: [78, 65, 88, 72, 91],
            backgroundColor: "rgba(34, 211, 238, 0.15)",
            borderColor: "#22d3ee",
            borderWidth: 2,
            pointBackgroundColor: "#6366f1",
            pointRadius: 5
          }]
        },
        options: {
          animation: { duration: 1200, easing: "easeInOutQuart" },
          scales: {
            r: {
              min: 0, max: 100,
              angleLines: { color: "rgba(255,255,255,0.1)" },
              grid: { color: "rgba(255,255,255,0.1)" },
              pointLabels: { color: "#ffffff", font: { size: 14, weight: "600" } },
              ticks: { display: false }
            }
          },
          plugins: { legend: { display: false } }
        }
      });

      resumeFile.value = "";
    });

    if (!localStorage.getItem("token")) {
      uploadStatus.textContent = "Login required to upload resume.";
      uploadStatus.style.color = "#fecaca";
    }
  </script>
</body>
</html>
